<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Display Images</title>
    <style>
        body {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        img {
            max-width: 200px;
            max-height: 200px;
            margin: 10px;
        }
    </style>
</head>
<body>
<h1>Images from the 'images' folder:</h1>

{% for filename in image_filenames %}
    <img src="{{ url_for('display_image', filename=filename) }}" alt="{{ filename }}">
{% endfor %}
</body>
</html>
